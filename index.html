<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research-Desk | Market Intelligence</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header-ui">
        <h1 class="serif">Research-Desk</h1>
        <p class="monospace">CREATED BY DS // ASSISTED BY AI</p>
        
        <div class="sample-reports">
            <span class="monospace">SAMPLES:</span>
            <div class="sample-tag">Indian EV Market</div>
            <div class="sample-tag">SaaS 2024</div>
            <div class="sample-tag">Quick Commerce</div>
        </div>

        <div class="input-group">
            <input type="text" id="industryInput" placeholder="Enter Industry (e.g. Luxury Watches in India)">
            <button id="runBtn" onclick="generateReport()">Initiate Research Report</button>
        </div>
    </div>

    <!-- The Skeleton Report -->
    <div id="report-container"></div>

    <div id="status-bar" class="monospace">
        STATUS: <span id="current-step">READY</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
